services:
  - type: web
    name: gantner-gc7-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GANTNER_ACCESS_TOKEN
        sync: false
      - key: HEARTBEAT_INTERVAL
        value: "30"
      # Live door-open switch. ON for commissioning: a granted scan transmits
      # IO.SetRelayState to open the matching door relay. Safe because the
      # allow-list is scoped to TEST123456 only — no real member can open a gate
      # yet. Set to "false" (here or in the Render dashboard) to return to
      # capture-only at any time.
      - key: GANTNER_SEND_UNLOCK
        value: "true"
