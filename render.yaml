services:
  - type: web
    name: gantner-gc7-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GANTNER_ACCESS_TOKEN
        sync: false
      - key: HEARTBEAT_INTERVAL
        value: "30"
      # Live door-open switch. Safe default OFF (capture-only). Flip to true in
      # the Render dashboard ONLY to run the live scan test — it lets a granted
      # (allow-listed) scan actually transmit IO.SetRelayState to open the door.
      - key: GANTNER_SEND_UNLOCK
        value: "false"
